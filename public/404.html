<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #141417;
            --accent-blue: #1d4ed8;
            --accent-glow: rgba(29, 78, 216, 0.15);
            --text-color: #e4e4e7;
            --text-muted: #71717a;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 24px;
        }

        .notfound-card {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .brand-code {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .notfound-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .notfound-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-home {
            display: inline-block;
            background-color: var(--border-color);
            color: var(--text-color);
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background-color: var(--accent-blue);
            color: white;
        }
    </style>
</head>
<body>

    <div class="notfound-card">
        <div class="brand-code">404</div>
        <h1 class="notfound-title">Catched?</h1>
        <p class="notfound-subtitle">Maybe the rain catched you?</p>
        
        <a href="index.html" class="btn-home">Return Home</a>
    </div>

</body>
</html>
