<svg xmlns="http://w3.org" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <!-- W Element Gradient -->
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="50%" stop-color="#0077ff" />
      <stop offset="100%" stop-color="#002699" />
    </linearGradient>
    
    <!-- Drop Shadow for Depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.7" />
    </filter>
    
    <!-- Inner Glow for the W -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff" />
      <feFlood flood-color="#00d2ff" flood-opacity="0.3" result="glowColor" />
      <feComposite in2="shadowDiff" operator="in" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Decorative Background Rings -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2" />
  <circle cx="250" cy="250" r="140" fill="none" stroke="#0077ff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 8" />
  
  <!-- Big Blue W -->
  <path d="M 120 150 L 175 330 L 215 220 L 250 285 L 285 220 L 325 330 L 380 150 L 335 150 L 295 270 L 250 200 L 205 270 L 165 150 Z" fill="url(#wGrad)" filter="url(#dropShadow)" />
  
  <!-- Foreground Highlight to make it pop -->
  <path d="M 120 150 L 175 330 L 215 220 L 250 285 L 285 220 L 325 330 L 380 150 L 335 150 L 295 270 L 250 200 L 205 270 L 165 150 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" filter="url(#innerGlow)" />
</svg>
