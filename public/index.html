<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>SPLASH V3</title>
    <link rel="shortcut icon" content="favicon.webp" />
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
    <style>
        /* Base Reset and Black Background */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Particle Canvas Background */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Content Layout Wrapper */
        .main-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        /* Typography & Structure */
        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .desc {
            color: #cccccc;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Forms and Input Boxes */
        form {
            width: 100%;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        #sj-error {
            color: #ff4a4a;
        }

        /* Footer Links */
        footer {
            position: absolute;
            bottom: 20px;
            z-index: 2;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: #888888;
        }

        footer div {
            margin: 5px 0;
        }

        footer a {
            color: #aaaaaa;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- White Floating Particles Context -->
    <canvas id="particle-canvas"></canvas>

    <!-- Main Content Panel -->
    <div class="main-container">
        
        <div title="SPLASH V3 Logo" class="flex-center logo-wrapper header-center">
            <h1>SPLASH V3</h1>
        </div>

        <div class="flex-center desc">
            <p>
                SPLASH V3 is a web pr*xy powered by Scramjet and Wisp.
            </p>
        </div>

        <!-- Enter URL Box -->
        <form id="url-form" class="flex-center" onsubmit="event.preventDefault();">
            <input id="url-address" type="text" placeholder="Enter URL (e.g., https://discord.com)" />
        </form>

        <!-- Search Box -->
        <form id="sj-form" class="flex-center">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Search the web freely" />
        </form>

        <div class="desc">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
        </div>

    </div>

    <footer>
        <div>
            <a title="The Mercury Workshop GitHub organization" href="https://github.com/MercuryWorkshop">Mercury Workshop</a>
            <a title="The example demo app" href="https://github.com/MercuryWorkshop">GitHub</a>
            <a title="License information" href="credits.html">Credits</a>
        </div>
        <div>
            <span>SPLASH V3 &copy; MW 2026</span>
        </div>
    </footer>

    <!-- Script for Dynamic Floating Particles Background -->
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 60;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
