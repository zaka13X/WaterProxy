<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Splash V3</title>
    <link rel="shortcut icon" content="favicon.webp" />
    <!-- Original Proxy Hooks -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    
    <style>
        /* Base Black UI Styles */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Particle Canvas */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* UI Container Layer */
        .ui-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto;
            transition: opacity 0.3s ease;
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 80px;
            height: auto;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 300;
        }

        .desc {
            text-align: center;
            color: #aaaaaa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Interactive Enter URL Elements */
        #sj-form {
            width: 100%;
            position: relative;
        }

        #sj-address {
            width: 100%;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #ffffff;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
        }

        #sj-address:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        #sj-error {
            color: #ff5252;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        #sj-error-code {
            color: #ff5252;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Footer Overlay */
        footer {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666666;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.3s ease;
        }

        footer a {
            color: #888888;
            text-decoration: none;
            margin-right: 15px;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #ffffff;
        }

        /* Proxy Iframe Styles */
        #proxy-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 10;
            display: none;
            background-color: #ffffff; /* White background while page loads */
        }
    </style>
</head>
<body>
    <!-- Particle Layer -->
    <canvas id="particle-canvas"></canvas>

    <!-- UI Interaction Layer -->
    <div class="ui-container" id="main-ui">
        <div title="" class="flex-center logo-wrapper header-center">
            <img class="logo" src="splash.svg" alt="" />
            <h1>Splash V3</h1>
        </div>
        <div class="flex-center desc left-margin">
            <p>An pr*xy powered by Scramjet to bypass network restrictions seamlessly.</p>
        </div>

        <!-- Functional Target Proxy Input Area -->
        <form id="sj-form" class="flex-center">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Enter URL or search freely..." autocomplete="off" />
        </form>

        <div class="desc left-margin">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
        </div>
    </div>

    <!-- Proxy Iframe -->
    <iframe id="proxy-frame"></iframe>

    <footer>
        <div>
            <a title="GitHub" href="https://github.com/zaka13X/Splash">My GitHub</a>
            <a title="License information" href="credits.html">Credits</a>
        </div>
        <div>
            <span>Scramjet &copy; MW 2026</span>
        </div>
    </footer>

    <!-- Combined Scripts -->
    <script>
        // Custom logic to hide UI and trigger iframe
        const form = document.getElementById('sj-form');
        const addressInput = document.getElementById('sj-address');
        const mainUI = document.getElementById('main-ui');
        const footer = document.querySelector('footer');
        const proxyFrame = document.getElementById('proxy-frame');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = addressInput.value.trim();
            if (!url) return;

            // Hide the homepage UI smoothly
            mainUI.style.opacity = '0';
            footer.style.opacity = '0';
            
            setTimeout(() => {
                mainUI.style.display = 'none';
                footer.style.display = 'none';
            }, 300);

            // Fetch the proxied URL from scramjet
            // Assuming scramjet module is globally defined and has a proxy url constructor
            let proxiedUrl = '';
            
            // This relies on your existing `search.js` or `index.js` logic.
            // Adjust the window.__scramjet$encode or scrambling function to fit your exact scramjet setup:
            try {
                // If your scramjet configuration creates a URL through specific backend configs:
                proxiedUrl = __scramjet$encode ? __scramjet$encode(url) : url; 
            } catch (err) {
                proxiedUrl = url;
            }

            // Set the iframe source and make it visible
            proxyFrame.src = proxiedUrl;
            proxyFrame.style.display = 'block';
        });
    </script>
</body>
</html>
